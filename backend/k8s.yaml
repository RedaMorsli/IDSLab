apiVersion: v1
kind: Namespace
metadata:
  name: idslab

---
apiVersion: v1
kind: Pod
metadata:
  name: idslab-backend
  namespace: idslab
  labels:
    app: idslab-backend
spec:
  containers:
        - name: idslab-backend
          image: 192.168.56.20:5000/idslab-backend
          imagePullPolicy: Always
          ports:
            - containerPort: 8765

---
apiVersion: v1
kind: Service
metadata:
  name: idslab-backend
  namespace: idslab
spec:
  type: NodePort
  selector:
    app: idslab-backend
  ports:
    - port: 8765
      targetPort: 8765
      nodePort: 30433

---
apiVersion: v1
kind: Pod
metadata:
  name: idslab-frontend
  namespace: idslab
  labels:
    app: idslab-frontend
spec:
  containers:
        - name: idslab-frontend
          image: 192.168.56.20:5000/idslab-frontend
          imagePullPolicy: Always
          ports:
            - containerPort: 8443


---
apiVersion: v1
kind: Service
metadata:
  name: idslab-frontend
  namespace: idslab
spec:
  type: NodePort
  selector:
    app: idslab-frontend
  ports:
    - port: 80
      targetPort: 8443
      nodePort: 30080
