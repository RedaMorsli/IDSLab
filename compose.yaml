services:
  idslab-backend:
    build: ./backend
    ports:
      - "8765:8765"
    networks:
      - idslab-net
  idslab-frontend:
    build:
      context: ./front-web
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    networks:
      - idslab-net
  minio:
    image: quay.io/minio/minio:latest
    command:
      - server
      - /data
      - "--console-address=:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - idslab-net

volumes:
  minio-data:

networks:
  idslab-net:
